<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionary — Done</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/quiz" class="brand">Questionary</a>
    <div class="nav-right">
        <a href="/admin" class="nav-link">Admin</a>
        <div class="nav-user">
            <span class="nav-link" style="color:#a0aec0" th:text="${#authentication.name}"></span>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <button type="submit" class="nav-link" style="background:none;border:none;cursor:pointer;color:#a0aec0;padding:0">Sign out</button>
            </form>
        </div>
    </div>
</nav>

<main class="container">
    <div class="card done-card">
        <div class="done-icon" th:classappend="${failedOnlyMode} ? ' done-icon-failed' : ''">&#10003;</div>
        <h2 th:text="${failedOnlyMode} ? 'Failed Drill Done!' : 'All Done!'">All Done!</h2>
        <p th:text="${failedOnlyMode} ? 'You have reviewed all failed questions.' : 'You have reviewed all questions.'">
            You have reviewed all questions.
        </p>

        <div class="stats done-stats">
            <div class="stat-box success">
                <div class="stat-number" th:text="${successCount}">0</div>
                <div class="stat-label">Success</div>
            </div>
            <div class="stat-box failed">
                <div class="stat-number" th:text="${failedCount}">0</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat-box unanswered">
                <div class="stat-number" th:text="${unansweredCount}">0</div>
                <div class="stat-label">Skipped</div>
            </div>
        </div>

        <div class="done-actions">
            <!-- Normal mode actions -->
            <a th:if="${unansweredCount > 0 and !failedOnlyMode}" href="/quiz" class="btn btn-primary">
                Continue (<span th:text="${unansweredCount}"></span> Skipped)
            </a>
            <form th:if="${failedCount > 0 and !failedOnlyMode}"
                  th:action="@{/quiz/start-failed-mode}" method="post" style="display:inline">
                <button type="submit" class="btn btn-danger">
                    Drill Failed (<span th:text="${failedCount}"></span>)
                </button>
            </form>

            <!-- Failed mode actions -->
            <a th:if="${failedOnlyMode and failedCount > 0}" href="/quiz" class="btn btn-danger">
                Drill Again (<span th:text="${failedCount}"></span> remaining)
            </a>
            <form th:if="${failedOnlyMode}" th:action="@{/quiz/toggle-failed-mode}" method="post" style="display:inline">
                <button type="submit" class="btn btn-secondary">Exit Failed Mode</button>
            </form>

            <a href="/admin" class="btn btn-outline">Admin</a>
        </div>
    </div>
</main>
</body>
</html>
