<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionary — User Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/quiz" class="nav-link">Quiz</a>
    <a href="/admin" class="nav-link">Admin</a>
    <a href="/admin/users" class="brand">Users</a>
    <div class="nav-right">
        <span class="nav-link" style="color:#a0aec0" th:text="${#authentication.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="nav-link" style="background:none;border:none;cursor:pointer;color:#a0aec0;padding:0">Sign out</button>
        </form>
    </div>
</nav>

<main class="container" style="max-width: 700px">

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

    <!-- Create user -->
    <div class="card">
        <h2>Create User</h2>
        <form th:action="@{/admin/users/create}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" class="form-control">
                    <option value="USER">User</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Create</button>
        </form>
    </div>

    <!-- User list -->
    <div class="card">
        <h2>Users (<span th:text="${#lists.size(users)}"></span>)</h2>
        <table class="question-table" th:if="${!#lists.isEmpty(users)}">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.username}"></td>
                    <td>
                        <span th:if="${u.role == 'ADMIN'}" class="badge badge-failed">ADMIN</span>
                        <span th:if="${u.role == 'USER'}"  class="badge badge-unanswered">USER</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" style="display:inline"
                              th:if="${u.username != #authentication.name}">
                            <button type="submit" class="btn btn-danger"
                                    onclick="return confirm('Delete user and all their questions?')">Delete</button>
                        </form>
                        <span th:if="${u.username == #authentication.name}" style="color:#a0aec0;font-size:0.85rem">(you)</span>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(users)}" class="empty-state" style="padding:1rem 0">
            <p>No users found.</p>
        </div>
    </div>

</main>
</body>
</html>
