server.port=8080
spring.datasource.url=jdbc:sqlite:/questionary/db/questionary.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Prevent SQLITE_BUSY errors in single-user app
spring.datasource.hikari.maximum-pool-size=1
# Keep session alive for 8 hours to avoid CSRF 403 after long inactivity
server.servlet.session.timeout=16h
